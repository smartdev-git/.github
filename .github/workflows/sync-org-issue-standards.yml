name: Sync org issue standards

on:
  workflow_dispatch:
    inputs:
      org:
        description: Organization to sync
        required: false
        default: smartdev-git
      dry_run:
        description: Preview changes without applying them
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '17 5 * * *'

permissions:
  contents: read

concurrency:
  group: sync-org-issue-standards
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate token availability
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.SMARTDEV_ORG_ADMIN_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "Missing SMARTDEV_ORG_ADMIN_TOKEN secret" >&2
            exit 1
          fi

      - name: Sync issue standards across the organization
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.SMARTDEV_ORG_ADMIN_TOKEN }}
          ORG_NAME: ${{ github.event.inputs.org || 'smartdev-git' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          if ($env:DRY_RUN -eq 'true') {
            ./scripts/sync-org-issue-standards.ps1 -Org $env:ORG_NAME -DryRun
          }
          else {
            ./scripts/sync-org-issue-standards.ps1 -Org $env:ORG_NAME
          }